services:
  backend:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      RUN_MIGRATIONS: "true"
      JWT_SECRET: dev-secret-change-me
      JWT_EXPIRES_IN: 7d
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules)\" ]; then npm install; fi && npm run dev"
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:5173/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    build:
      context: .
      dockerfile: src/Dockerfile.dev
    # Utiliser npm run dev pour le hot-reload Vite
    # npm install ne s'exécute que si node_modules n'existe pas ou est vide
    command: sh -c "sleep 3 && if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules)\" ]; then npm install --legacy-peer-deps; fi && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      # Monter uniquement src/ et public/ — les fichiers de config sont dans l'image
      # (les montages individuels de fichiers causent l'erreur -35 sur macOS VirtioFS)
      - ./src:/app/src
      - ./public:/app/public
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001/api
      # Le polling est maintenant configuré dans vite.config.ts
    # Limites de ressources pour éviter les OOM kills
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

